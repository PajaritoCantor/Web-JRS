version: '3.8'

services:
  db:
    image: nouchka/sqlite3:latest
    volumes:
      - ./backend/data:/root/db
    # SQLite3 es un archivo. Este contenedor es opcional si solo usamos nodejs con driver, 
    # pero si queremos CLI por separado podemos dejarlo, aunque Node lo creará directamente usando el driver.
    # Por tanto, eliminamos el servicio db puro y dejamos que Node.js maneje el archivo.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webjrs-backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - PORT=3000
      - DB_PATH=/app/data/database.sqlite
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: webjrs-frontend
    ports:
      - "4321:80" # Nginx expone 80, lo mapeamos al 4321 (por defecto Astro ext)
    depends_on:
      - backend
    restart: unless-stopped
